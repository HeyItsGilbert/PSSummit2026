# Markdown Madness - PS Summit 2026
# Serves scaffolded sites from ./sites/ via volume mounts.
# Run ./build.ps1 ScaffoldAll first, then: docker compose up

services:
  jekyll:
    build:
      context: containers/jekyll
    volumes:
      - ./sites/jekyll-demo:/site
    ports:
      - "4000:4000"

  mkdocs:
    build:
      context: containers/mkdocs
    volumes:
      - ./sites/mkdocs-demo:/site
    ports:
      - "4001:8000"

  hugo:
    build:
      context: containers/hugo
    volumes:
      - ./sites/hugo-demo:/site
    ports:
      - "4002:1313"

  docusaurus:
    build:
      context: containers/docusaurus
    volumes:
      - ./sites/docusaurus-demo:/site
    ports:
      - "4003:3000"

  astro:
    build:
      context: containers/astro
    volumes:
      - ./sites/astro-demo:/site
    ports:
      - "4004:4321"
